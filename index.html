<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proofly - Verificar Prueba</title>
  <meta name="description" content="Verifica la autenticidad e integridad de una prueba digital sellada con Proofly.">
  <meta name="theme-color" content="#0D0D0D">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F6E1;</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0D0D0D;
      --surface: #1A1A1A;
      --surface-hover: #242424;
      --border: #2A2A2A;
      --text: #F5F5F5;
      --text-secondary: #999;
      --accent: #6C63FF;
      --accent-dim: rgba(108, 99, 255, 0.15);
      --success: #10B981;
      --success-dim: rgba(16, 185, 129, 0.12);
      --error: #EF4444;
      --error-dim: rgba(239, 68, 68, 0.12);
      --warning: #F59E0B;
      --warning-dim: rgba(245, 158, 11, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: 20px;
      margin: 0 auto;
    }

    /* Header */
    .header { text-align: center; padding: 40px 0 20px; }
    .header-icon { font-size: 48px; margin-bottom: 12px; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .header p { color: var(--text-secondary); font-size: 14px; margin-top: 6px; }

    /* Loading */
    .loading { display: flex; flex-direction: column; align-items: center; padding: 60px 0; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--text-secondary); margin-top: 16px; font-size: 14px; }

    /* Status Badge */
    .status-badge { display: flex; align-items: center; gap: 10px; padding: 16px; border-radius: var(--radius); margin-bottom: 20px; }
    .status-badge.valid { background: var(--success-dim); border: 1px solid rgba(16, 185, 129, 0.25); }
    .status-badge.invalid { background: var(--error-dim); border: 1px solid rgba(239, 68, 68, 0.25); }
    .status-icon { font-size: 28px; flex-shrink: 0; }
    .status-text h2 { font-size: 16px; font-weight: 600; }
    .status-badge.valid .status-text h2 { color: var(--success); }
    .status-text p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* Mode Pill */
    .mode-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(108, 99, 255, 0.2); margin-bottom: 20px; }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 14px; }

    /* Photo Gallery */
    .photo-gallery { margin-bottom: 16px; }
    .photo-container { position: relative; width: 100%; border-radius: var(--radius); overflow: hidden; background: var(--surface); border: 1px solid var(--border); }
    .photo-container img { width: 100%; height: auto; display: block; max-height: 400px; object-fit: contain; background: #000; }
    .photo-nav { display: flex; gap: 8px; margin-top: 10px; justify-content: center; }
    .photo-thumb { width: 56px; height: 56px; border-radius: var(--radius-sm); object-fit: cover; border: 2px solid var(--border); cursor: pointer; transition: border-color 0.2s; }
    .photo-thumb.active { border-color: var(--accent); }
    .photo-counter { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 12px; }
    .description-text { font-size: 14px; color: var(--text); line-height: 1.5; margin-top: 12px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }

    /* Map */
    .map-container { width: 100%; height: 220px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); margin-bottom: 8px; }
    .map-coords { font-family: var(--mono); font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

    /* Hash */
    .hash-container { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
    .hash-label { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 6px; }
    .hash-value { font-family: var(--mono); font-size: 12px; color: var(--text); word-break: break-all; line-height: 1.6; user-select: all; }

    /* Info Rows */
    .info-grid { display: grid; gap: 0; }
    .info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 13px; color: var(--text-secondary); flex-shrink: 0; }
    .info-value { font-size: 13px; font-weight: 500; color: var(--text); text-align: right; margin-left: 16px; }
    .info-value.mono { font-family: var(--mono); font-size: 12px; }

    /* Badges */
    .gps-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .gps-badge.accurate { background: var(--success-dim); color: var(--success); }
    .gps-badge.approximate { background: var(--warning-dim); color: var(--warning); }
    .gps-badge.unavailable { background: var(--error-dim); color: var(--error); }
    .gps-badge.private { background: var(--accent-dim); color: var(--accent); }
    .tag-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; background: var(--surface-hover); color: var(--text); }

    /* Existence Only */
    .existence-notice { text-align: center; padding: 20px; background: var(--accent-dim); border: 1px dashed rgba(108, 99, 255, 0.3); border-radius: var(--radius-sm); margin-bottom: 14px; }
    .existence-notice .icon { font-size: 32px; margin-bottom: 8px; }
    .existence-notice h3 { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
    .existence-notice p { font-size: 12px; color: var(--text-secondary); }

    /* Error / No Token */
    .error-container, .no-token { text-align: center; padding: 48px 20px; }
    .error-container .icon, .no-token .icon { font-size: 48px; margin-bottom: 16px; }
    .error-container h2, .no-token h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .error-container p, .no-token p { color: var(--text-secondary); font-size: 14px; line-height: 1.5; max-width: 360px; margin: 0 auto; }

    /* Footer */
    .footer { text-align: center; padding: 32px 0; margin-top: auto; }
    .footer p { font-size: 12px; color: var(--text-secondary); }

    /* Collapsible */
    .collapsible-toggle { display: flex; align-items: center; justify-content: space-between; width: 100%; background: none; border: none; color: var(--text-secondary); font-size: 13px; cursor: pointer; padding: 10px 0; }
    .collapsible-toggle:hover { color: var(--text); }
    .collapsible-toggle .arrow { transition: transform 0.2s; font-size: 12px; }
    .collapsible-toggle.open .arrow { transform: rotate(90deg); }
    .collapsible-content { display: none; padding-top: 8px; }
    .collapsible-content.open { display: block; }

    /* Animation */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .fade-in-delay { animation-delay: 0.15s; opacity: 0; }
    .fade-in-delay-2 { animation-delay: 0.3s; opacity: 0; }

    /* Leaflet dark overrides */
    .leaflet-tile-pane { filter: brightness(0.7) contrast(1.1) saturate(0.8); }
    .leaflet-control-attribution { background: rgba(0,0,0,0.6) !important; color: #888 !important; font-size: 10px !important; }
    .leaflet-control-attribution a { color: #aaa !important; }

    /* Drag & Drop Zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
    .drop-zone h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .drop-zone p { font-size: 13px; color: var(--text-secondary); }

    /* Share Key Input */
    .key-input-container { margin-bottom: 20px; }
    .key-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .key-input:focus { border-color: var(--accent); }
    .key-input::placeholder { color: var(--text-secondary); }

    /* Verify Button */
    .verify-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 20px;
    }
    .verify-btn:hover { opacity: 0.9; }
    .verify-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* File Info */
    .file-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }
    .file-info .file-icon { font-size: 20px; }
    .file-info .file-name { font-size: 13px; font-weight: 500; flex: 1; }
    .file-info .file-size { font-size: 12px; color: var(--text-secondary); }
    .file-info .file-remove { cursor: pointer; color: var(--error); font-size: 18px; line-height: 1; }

    /* Media Verification */
    .media-check { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .media-check:last-child { border-bottom: none; }
    .media-check .check-icon { font-size: 16px; flex-shrink: 0; }
    .media-check .check-label { font-size: 13px; flex: 1; }
    .media-check .check-status { font-size: 12px; font-weight: 600; }
    .media-check .check-status.pass { color: var(--success); }
    .media-check .check-status.fail { color: var(--error); }
    .media-check .check-status.pending { color: var(--text-secondary); }

    /* Additional Verify Button */
    .verify-extra-btn {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
    }
    .verify-extra-btn:hover { border-color: var(--accent); }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="header-icon">&#x1F6E1;</div>
      <h1>Proofly</h1>
      <p>Verificacion de Prueba Digital</p>
    </div>
    <div id="app"></div>
  </div>

  <div class="footer">
    <p>Proofly &mdash; Evidencia digital sellada</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    // =========================================================================
    // Configuration
    // =========================================================================
    const SUPABASE_URL = 'https://ctwvjxwckghhypcdxspq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0d3ZqeHdja2doaHlwY2R4c3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NTgyMzMsImV4cCI6MjA4NzEzNDIzM30.VXg8eQLjybiMdzzmRRIYnPYHNZuUcnyYQA0xa90bFOM';

    // =========================================================================
    // Helpers
    // =========================================================================

    async function supabaseRpc(fnName, params) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fnName}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify(params),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Error ${res.status}`);
      }
      return res.json();
    }

    function getToken() {
      return new URLSearchParams(window.location.search).get('token') || null;
    }

    function getShareKeyFromFragment() {
      const hash = window.location.hash;
      if (!hash) return null;
      const match = hash.match(/key=([a-fA-F0-9]+)/);
      return match ? match[1] : null;
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function sha256Hex(data) {
      let buffer;
      if (typeof data === 'string') {
        buffer = new TextEncoder().encode(data);
      } else {
        buffer = data;
      }
      const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const app = document.getElementById('app');

    const TAG_LABELS = {
      property: { label: 'Propiedad', icon: '&#x1F3E0;' },
      vehicle: { label: 'Vehiculo', icon: '&#x1F697;' },
      delivery: { label: 'Entrega', icon: '&#x1F4E6;' },
      personal: { label: 'Personal', icon: '&#x1F464;' },
      other: { label: 'Otro', icon: '&#x1F4CB;' },
    };
    const MODE_LABELS = {
      full: { label: 'Acceso completo', icon: '&#x1F4E6;' },
      no_location: { label: 'Sin ubicacion', icon: '&#x1F6E1;' },
      existence_only: { label: 'Solo existencia', icon: '&#x1F441;' },
      temporal: { label: 'Temporal', icon: '&#x1F552;' },
    };
    const GPS_LABELS = {
      accurate: { label: 'Preciso', css: 'accurate' },
      approximate: { label: 'Aproximado', css: 'approximate' },
      unavailable: { label: 'No disponible', css: 'unavailable' },
      private: { label: 'Privado', css: 'private' },
    };

    function formatDate(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleString('es-MX', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short' });
    }
    function formatDateShort(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleDateString('es-MX', { year: 'numeric', month: 'short', day: 'numeric' });
    }
    function escapeHtml(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    // =========================================================================
    // Render
    // =========================================================================

    function renderLoading() {
      app.innerHTML = '<div class="loading"><div class="spinner"></div><p>Verificando prueba...</p></div>';
    }
    function renderNoToken() {
      app.innerHTML = '<div class="no-token fade-in"><div class="icon">&#x1F50D;</div><h2>No se proporcion&oacute; un token</h2><p>Este enlace no contiene un token de verificaci&oacute;n v&aacute;lido. Usa el enlace completo compartido desde la app de Proofly.</p></div>';
    }
    function renderError(message) {
      const isExpired = message.toLowerCase().includes('expir');
      app.innerHTML = `<div class="error-container fade-in"><div class="icon">${isExpired ? '&#x23F0;' : '&#x26A0;'}</div><h2>${isExpired ? 'Enlace expirado' : 'No se pudo verificar'}</h2><p>${escapeHtml(message)}</p></div>`;
    }

    function renderResult(data) {
      const { share, proof } = data;
      const mode = MODE_LABELS[share.mode] || MODE_LABELS.full;
      const tag = TAG_LABELS[proof.tag] || TAG_LABELS.other;
      const gps = GPS_LABELS[proof.gps_status] || GPS_LABELS.unavailable;
      const isExistenceOnly = share.mode === 'existence_only';
      const hasPhotos = !isExistenceOnly && proof.photos && proof.photos.length > 0 && proof.photos[0].url;
      const hasGps = proof.gps && proof.gps.latitude && proof.gps.longitude;

      let html = `
        <div class="status-badge valid fade-in">
          <div class="status-icon">&#x2705;</div>
          <div class="status-text">
            <h2>Prueba verificada</h2>
            <p>Integridad confirmada &mdash; sellada el ${formatDateShort(proof.timestamp_utc)}</p>
          </div>
        </div>
        <div class="mode-pill fade-in"><span>${mode.icon}</span><span>${mode.label}</span></div>
      `;

      // Existence only notice
      if (isExistenceOnly) {
        html += `<div class="card fade-in fade-in-delay"><div class="existence-notice"><div class="icon">&#x1F441;</div><h3>Solo verificaci&oacute;n de existencia</h3><p>El contenido est&aacute; oculto. Solo se confirma que la prueba fue creada y sellada en la fecha indicada.</p></div></div>`;
      }

      // Photos
      if (hasPhotos) {
        const photos = proof.photos.filter(p => p.url);
        html += `<div class="card fade-in fade-in-delay photo-gallery">
          <div class="card-title">Evidencia fotogr&aacute;fica</div>
          <div class="photo-container">
            <img id="main-photo" src="${escapeHtml(photos[0].url)}" alt="Evidencia fotografica" />
            ${photos.length > 1 ? `<span class="photo-counter">1 / ${photos.length}</span>` : ''}
          </div>`;
        if (photos.length > 1) {
          html += '<div class="photo-nav">';
          photos.forEach((p, i) => {
            html += `<img class="photo-thumb ${i === 0 ? 'active' : ''}" src="${escapeHtml(p.url)}" onclick="selectPhoto(${i})" alt="Foto ${i + 1}" />`;
          });
          html += '</div>';
        }
        if (proof.description) {
          html += `<div class="description-text">${escapeHtml(proof.description)}</div>`;
        }
        html += '</div>';
      } else if (!isExistenceOnly && proof.description) {
        html += `<div class="card fade-in fade-in-delay">
          <div class="card-title">Descripci&oacute;n</div>
          <div class="description-text">${escapeHtml(proof.description)}</div>
        </div>`;
      }

      // Map
      if (hasGps) {
        html += `<div class="card fade-in fade-in-delay">
          <div class="card-title">Ubicaci&oacute;n de captura</div>
          <div id="map" class="map-container"></div>
          <div class="map-coords">${proof.gps.latitude.toFixed(6)}, ${proof.gps.longitude.toFixed(6)}${proof.gps.accuracy ? ' &mdash; precisi&oacute;n: ' + Math.round(proof.gps.accuracy) + 'm' : ''}</div>
        </div>`;
      }

      // Hash
      html += `<div class="card fade-in fade-in-delay-2">
        <div class="card-title">Integridad criptogr&aacute;fica</div>
        <div class="hash-container">
          <div class="hash-label">SHA-256</div>
          <div class="hash-value">${escapeHtml(proof.evidence_hash)}</div>
        </div>
      </div>`;

      // Details
      html += `<div class="card fade-in fade-in-delay-2">
        <div class="card-title">Detalles de la prueba</div>
        <div class="info-grid">
          <div class="info-row"><span class="info-label">Fecha de sellado</span><span class="info-value">${formatDate(proof.timestamp_utc)}</span></div>`;
      if (!isExistenceOnly) {
        html += `
          <div class="info-row"><span class="info-label">Categor&iacute;a</span><span class="info-value"><span class="tag-badge">${tag.icon} ${tag.label}</span></span></div>
          <div class="info-row"><span class="info-label">Fotos</span><span class="info-value">${proof.photo_count}</span></div>
          <div class="info-row"><span class="info-label">GPS</span><span class="info-value"><span class="gps-badge ${gps.css}">${gps.label}</span></span></div>`;
      }
      html += `<div class="info-row"><span class="info-label">Estado</span><span class="info-value"><span class="gps-badge accurate">&#x1F512; Sellado</span></span></div>
        </div></div>`;

      // Technical details
      html += `<div class="card fade-in fade-in-delay-2">
        <button class="collapsible-toggle" onclick="toggleCollapsible(this)">
          <span>Detalles t&eacute;cnicos</span><span class="arrow">&#x25B6;</span>
        </button>
        <div class="collapsible-content"><div class="info-grid">
          <div class="info-row"><span class="info-label">Algoritmo</span><span class="info-value mono">SHA-256 + AES-256-CBC</span></div>
          <div class="info-row"><span class="info-label">Dispositivo</span><span class="info-value">${escapeHtml(proof.device_model || '-')}</span></div>
          <div class="info-row"><span class="info-label">Versi&oacute;n app</span><span class="info-value mono">${escapeHtml(proof.app_version || '-')}</span></div>
          <div class="info-row"><span class="info-label">Modo de acceso</span><span class="info-value">${mode.label}</span></div>
          <div class="info-row"><span class="info-label">Expira</span><span class="info-value">${share.expires_at ? formatDate(share.expires_at) : 'Nunca'}</span></div>
          <div class="info-row"><span class="info-label">Accesos</span><span class="info-value">${share.access_count}</span></div>
          <div class="info-row"><span class="info-label">Compartido el</span><span class="info-value">${formatDateShort(share.created_at)}</span></div>
        </div></div>
      </div>`;

      // How it works
      html += `<div class="card fade-in fade-in-delay-2">
        <button class="collapsible-toggle" onclick="toggleCollapsible(this)">
          <span>&#x2139; &iquest;C&oacute;mo funciona?</span><span class="arrow">&#x25B6;</span>
        </button>
        <div class="collapsible-content">
          <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;">
            Proofly sella evidencia digital en el dispositivo del usuario usando SHA-256 para integridad y AES-256 para encripci&oacute;n.
            Cada enlace compartido tiene su propia clave derivada y puede ser revocado independientemente.
            La marca de tiempo es provista por el servidor para prevenir manipulaci&oacute;n de reloj.
          </p>
        </div>
      </div>`;

      app.innerHTML = html;

      // Store photos reference for gallery navigation
      if (hasPhotos) {
        window._photos = proof.photos.filter(p => p.url);
      }

      // Init map after DOM is ready
      if (hasGps) {
        setTimeout(() => initMap(proof.gps.latitude, proof.gps.longitude, proof.gps.accuracy), 100);
      }
    }

    // =========================================================================
    // Photo Gallery
    // =========================================================================

    function selectPhoto(index) {
      const photos = window._photos;
      if (!photos || !photos[index]) return;
      document.getElementById('main-photo').src = photos[index].url;
      document.querySelectorAll('.photo-thumb').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
      const counter = document.querySelector('.photo-counter');
      if (counter) counter.textContent = `${index + 1} / ${photos.length}`;
    }

    // =========================================================================
    // Map
    // =========================================================================

    function initMap(lat, lng, accuracy) {
      const mapEl = document.getElementById('map');
      if (!mapEl) return;
      const map = L.map(mapEl, { zoomControl: false, attributionControl: true }).setView([lat, lng], 16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19,
      }).addTo(map);
      L.marker([lat, lng]).addTo(map);
      if (accuracy) {
        L.circle([lat, lng], { radius: accuracy, color: '#6C63FF', fillColor: '#6C63FF', fillOpacity: 0.12, weight: 1 }).addTo(map);
      }
    }

    function toggleCollapsible(btn) {
      btn.classList.toggle('open');
      btn.nextElementSibling.classList.toggle('open');
    }

    // =========================================================================
    // File-based .proofly verification (new flow)
    // =========================================================================

    let selectedFile = null;

    function renderFileMode(shareKey) {
      let html = `
        <div class="fade-in">
          <div id="drop-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
            <div class="icon">&#x1F4C2;</div>
            <h3>Arrastra un archivo .proofly aqu&iacute;</h3>
            <p>o haz clic para seleccionar</p>
          </div>
          <input type="file" id="file-input" accept=".proofly" style="display:none" />
          <div id="file-info-container"></div>
          <div class="key-input-container">
            <input type="text" class="key-input" id="key-input" value="${shareKey ? escapeHtml(shareKey) : ''}" placeholder="Pega la clave de acceso (hex o enlace proofly://)..." />
          </div>
          <button class="verify-btn" id="verify-btn" disabled onclick="handleVerifyFile()">Verificar archivo</button>
          <div id="verify-result"></div>
        </div>
      `;
      app.innerHTML = html;

      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const keyInput = document.getElementById('key-input');

      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
      dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) handleFileSelected(file);
      });
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleFileSelected(file);
      });
      keyInput.addEventListener('input', updateVerifyButton);
    }

    function handleFileSelected(file) {
      if (!file.name.endsWith('.proofly')) {
        alert('Por favor selecciona un archivo .proofly');
        return;
      }
      selectedFile = file;
      document.getElementById('file-info-container').innerHTML = `
        <div class="file-info">
          <span class="file-icon">&#x1F4C4;</span>
          <span class="file-name">${escapeHtml(file.name)}</span>
          <span class="file-size">${formatBytes(file.size)}</span>
          <span class="file-remove" onclick="removeFile()">&times;</span>
        </div>
      `;
      updateVerifyButton();
    }

    function removeFile() {
      selectedFile = null;
      document.getElementById('file-info-container').innerHTML = '';
      document.getElementById('verify-result').innerHTML = '';
      updateVerifyButton();
    }

    function updateVerifyButton() {
      const btn = document.getElementById('verify-btn');
      const keyInput = document.getElementById('key-input');
      if (btn && keyInput) {
        btn.disabled = !selectedFile || !keyInput.value.trim();
      }
    }

    async function handleVerifyFile() {
      if (!selectedFile) return;

      const keyInput = document.getElementById('key-input');
      const shareKeyRaw = keyInput.value.trim();

      // Extract hex key from deep link format if pasted (proofly://open?key=hex or #key=hex)
      let key = shareKeyRaw;
      const keyMatch = shareKeyRaw.match(/key=([a-fA-F0-9]+)/);
      if (keyMatch) key = keyMatch[1];

      if (!key) { alert('Ingresa la clave de acceso'); return; }

      const resultDiv = document.getElementById('verify-result');
      resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Analizando archivo...</p></div>';

      try {
        // 1. Read file as ArrayBuffer
        const arrayBuffer = await selectedFile.arrayBuffer();

        // 2. Parse ZIP with JSZip
        const zip = await JSZip.loadAsync(arrayBuffer);

        // 3. Extract manifest.json
        const manifestFile = zip.file('manifest.json');
        if (!manifestFile) throw new Error('Archivo .proofly inv\u00e1lido: no contiene manifest.json');

        const manifestJson = await manifestFile.async('string');
        const manifest = JSON.parse(manifestJson);

        if (manifest.version !== '1.0') throw new Error('Versi\u00f3n de .proofly no soportada: ' + manifest.version);

        // 4. Verify evidence hash (SHA-256 over sorted canonical JSON)
        const hashable = {
          createdAt: manifest.createdAt,
          description: manifest.description,
          device: manifest.device,
          gpsCentroid: manifest.gpsCentroid,
          gpsRadius: manifest.gpsRadius,
          media: manifest.media,
          proofId: manifest.proofId,
          sealedAt: manifest.sealedAt,
          tag: manifest.tag,
          version: manifest.version,
        };

        function sortedStringify(obj) {
          if (obj === null || typeof obj !== 'object') return JSON.stringify(obj);
          if (Array.isArray(obj)) return '[' + obj.map(sortedStringify).join(',') + ']';
          const keys = Object.keys(obj).sort();
          return '{' + keys.map(k => JSON.stringify(k) + ':' + sortedStringify(obj[k])).join(',') + '}';
        }

        const canonical = sortedStringify(hashable);
        const computedHash = 'sha256:' + await sha256Hex(canonical);
        const manifestValid = computedHash === manifest.evidenceHash;

        // 5. Verify each embedded media file hash
        const mediaResults = [];
        for (const entry of manifest.media) {
          if (entry.embedded) {
            const zipFileName = 'media/' + entry.id + '.enc';
            const mediaFile = zip.file(zipFileName);
            if (mediaFile) {
              const mediaData = await mediaFile.async('uint8array');
              const mediaHash = 'sha256:' + await sha256Hex(mediaData);
              mediaResults.push({
                id: entry.id, type: entry.type,
                expected: entry.hash, actual: mediaHash,
                status: mediaHash === entry.hash ? 'pass' : 'fail',
              });
            } else {
              mediaResults.push({ id: entry.id, type: entry.type, expected: entry.hash, actual: null, status: 'missing' });
            }
          } else {
            mediaResults.push({ id: entry.id, type: entry.type, expected: entry.hash, actual: null, status: 'not-embedded' });
          }
        }

        // 6. Render result
        renderFileVerificationResult(manifest, manifestValid, mediaResults);

      } catch (err) {
        resultDiv.innerHTML = `<div class="error-container fade-in"><div class="icon">&#x26A0;</div><h2>Error de verificaci&oacute;n</h2><p>${escapeHtml(err.message)}</p></div>`;
      }
    }

    function renderFileVerificationResult(manifest, manifestValid, mediaResults) {
      const allEmbeddedOk = mediaResults.filter(r => r.status !== 'not-embedded' && r.status !== 'missing').every(r => r.status === 'pass');
      const isValid = manifestValid && allEmbeddedOk;
      const tag = TAG_LABELS[manifest.tag] || TAG_LABELS.other;
      const isExistence = manifest.description === '' && manifest.media.every(m => !m.embedded);

      let html = `
        <div class="status-badge ${isValid ? 'valid' : 'invalid'} fade-in">
          <div class="status-icon">${isValid ? '&#x2705;' : '&#x274C;'}</div>
          <div class="status-text">
            <h2>${isValid ? 'Archivo verificado' : 'Verificaci\u00f3n fallida'}</h2>
            <p>${isValid ? 'Integridad confirmada' : 'El archivo ha sido modificado'} &mdash; sellada el ${formatDateShort(manifest.sealedAt)}</p>
          </div>
        </div>
      `;

      if (isExistence) {
        html += `<div class="card fade-in"><div class="existence-notice"><div class="icon">&#x1F441;</div><h3>Solo verificaci&oacute;n de existencia</h3><p>El contenido est&aacute; oculto. Solo se confirma que la prueba fue creada y sellada.</p></div></div>`;
      }

      // Evidence Hash integrity
      html += `<div class="card fade-in">
        <div class="card-title">Integridad criptogr&aacute;fica</div>
        <div class="hash-container">
          <div class="hash-label">Evidence Hash ${manifestValid ? '&#x2705;' : '&#x274C;'}</div>
          <div class="hash-value">${escapeHtml(manifest.evidenceHash)}</div>
        </div>
      </div>`;

      // Media verification
      if (mediaResults.length > 0) {
        const passCount = mediaResults.filter(r => r.status === 'pass').length;
        html += `<div class="card fade-in">
          <div class="card-title">Verificaci&oacute;n de medios (${passCount}/${mediaResults.length})</div>`;
        for (const mr of mediaResults) {
          const icon = mr.status === 'pass' ? '&#x2705;' : mr.status === 'fail' ? '&#x274C;' : mr.status === 'not-embedded' ? '&#x1F4E4;' : '&#x2753;';
          const statusLabel = mr.status === 'pass' ? 'OK' : mr.status === 'fail' ? 'ALTERADO' : mr.status === 'not-embedded' ? 'No incluido' : 'Falta';
          const statusClass = mr.status === 'pass' ? 'pass' : mr.status === 'fail' ? 'fail' : 'pending';
          html += `<div class="media-check">
            <span class="check-icon">${icon}</span>
            <span class="check-label">${escapeHtml(mr.id)} (${mr.type})</span>
            <span class="check-status ${statusClass}">${statusLabel}</span>
          </div>`;
          if (mr.status === 'not-embedded') {
            html += `<button class="verify-extra-btn" onclick="verifyExtraMedia('${escapeHtml(mr.id)}', '${escapeHtml(mr.expected)}')">Verificar archivo por separado &rarr;</button>`;
          }
        }
        html += '</div>';
      }

      // GPS Map (multi-point)
      const gpsPoints = [];
      for (const m of manifest.media) {
        if (!m.gps) continue;
        if (m.gps.start) {
          gpsPoints.push({ lat: m.gps.start.lat, lng: m.gps.start.lng, label: m.id + ' (inicio)' });
          gpsPoints.push({ lat: m.gps.end.lat, lng: m.gps.end.lng, label: m.id + ' (fin)' });
        } else if (m.gps.lat != null) {
          gpsPoints.push({ lat: m.gps.lat, lng: m.gps.lng, label: m.id });
        }
      }

      if (gpsPoints.length > 0) {
        html += `<div class="card fade-in">
          <div class="card-title">Ubicaci&oacute;n de captura (${gpsPoints.length} puntos)</div>
          <div id="map" class="map-container"></div>
          ${manifest.gpsRadius ? `<div class="map-coords">${gpsPoints.length} archivos capturados en un radio de ${Math.round(manifest.gpsRadius)}m</div>` : ''}
        </div>`;
      }

      // Details
      html += `<div class="card fade-in">
        <div class="card-title">Detalles</div>
        <div class="info-grid">
          <div class="info-row"><span class="info-label">Fecha de sellado</span><span class="info-value">${formatDate(manifest.sealedAt)}</span></div>`;
      if (!isExistence) {
        html += `
          <div class="info-row"><span class="info-label">Descripci&oacute;n</span><span class="info-value">${escapeHtml(manifest.description)}</span></div>
          <div class="info-row"><span class="info-label">Categor&iacute;a</span><span class="info-value"><span class="tag-badge">${tag.icon} ${tag.label}</span></span></div>`;
      }
      html += `
          <div class="info-row"><span class="info-label">Archivos</span><span class="info-value">${manifest.media.length}</span></div>
          <div class="info-row"><span class="info-label">Dispositivo</span><span class="info-value">${escapeHtml(manifest.device.model)}</span></div>
          <div class="info-row"><span class="info-label">Versi&oacute;n app</span><span class="info-value mono">${escapeHtml(manifest.device.appVersion)}</span></div>
        </div>
      </div>`;

      document.getElementById('verify-result').innerHTML = html;

      // Init multi-point map after DOM is ready
      if (gpsPoints.length > 0) {
        setTimeout(() => initMultiMap(gpsPoints, manifest.gpsRadius, manifest.gpsCentroid), 100);
      }
    }

    async function verifyExtraMedia(mediaId, expectedHash) {
      const input = document.createElement('input');
      input.type = 'file';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const buffer = await file.arrayBuffer();
          const hash = 'sha256:' + await sha256Hex(new Uint8Array(buffer));
          const match = hash === expectedHash;
          alert(match
            ? `Archivo verificado: ${mediaId} coincide con el hash del manifiesto.`
            : `ALERTA: ${mediaId} NO coincide. El archivo ha sido modificado.`
          );
        } catch (err) {
          alert('Error al verificar: ' + err.message);
        }
      };
      input.click();
    }

    // =========================================================================
    // Multi-point Map
    // =========================================================================

    function initMultiMap(points, radius, centroid) {
      const mapEl = document.getElementById('map');
      if (!mapEl) return;

      const center = centroid
        ? [centroid.lat, centroid.lng]
        : [points[0].lat, points[0].lng];

      const map = L.map(mapEl, { zoomControl: false }).setView(center, 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19,
      }).addTo(map);

      const markers = [];
      for (const pt of points) {
        const marker = L.marker([pt.lat, pt.lng]).addTo(map);
        if (pt.label) marker.bindPopup(pt.label);
        markers.push(marker);
      }

      // Draw lines between start/end GPS for video/audio tracks
      for (let i = 0; i < points.length - 1; i++) {
        const a = points[i];
        const b = points[i + 1];
        if (a.label && b.label && a.label.replace(' (inicio)', '') === b.label.replace(' (fin)', '')) {
          L.polyline([[a.lat, a.lng], [b.lat, b.lng]], { color: '#6C63FF', weight: 2, dashArray: '5,5' }).addTo(map);
        }
      }

      if (radius && centroid) {
        L.circle([centroid.lat, centroid.lng], {
          radius: radius,
          color: '#6C63FF',
          fillColor: '#6C63FF',
          fillOpacity: 0.08,
          weight: 1,
        }).addTo(map);
      }

      if (markers.length > 1) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.2));
      }
    }

    // =========================================================================
    // Main — Route to correct mode
    // =========================================================================

    async function main() {
      const token = getToken();
      const shareKey = getShareKeyFromFragment();

      // Mode 1: Legacy token-based verification (backward compatible)
      if (token) {
        renderLoading();
        try {
          const result = await supabaseRpc('verify_share', { p_token: token });
          if (result && result.error) { renderError(result.error); return; }
          if (!result || !result.share || !result.proof) { renderError('Respuesta inesperada del servidor.'); return; }
          renderResult(result);
        } catch (err) {
          renderError(err.message || 'Error de conexi\u00f3n. Intenta de nuevo.');
        }
        return;
      }

      // Mode 2: File-based .proofly verification (new)
      renderFileMode(shareKey);
    }

    main();
  </script>
