<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proofly - Verificar Prueba</title>
  <meta name="description" content="Verifica la autenticidad e integridad de una prueba digital sellada con Proofly.">
  <meta name="theme-color" content="#0D0D0D">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F6E1;</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0D0D0D;
      --surface: #1A1A1A;
      --surface-hover: #242424;
      --border: #2A2A2A;
      --text: #F5F5F5;
      --text-secondary: #999;
      --accent: #6C63FF;
      --accent-dim: rgba(108, 99, 255, 0.15);
      --success: #10B981;
      --success-dim: rgba(16, 185, 129, 0.12);
      --error: #EF4444;
      --error-dim: rgba(239, 68, 68, 0.12);
      --warning: #F59E0B;
      --warning-dim: rgba(245, 158, 11, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: clamp(16px, 4vw, 20px);
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 40px 0 20px;
    }

    .header-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 6px;
      line-height: 1.5;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading p {
      color: var(--text-secondary);
      margin-top: 16px;
      font-size: 14px;
    }

    /* Status Badge */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-radius: var(--radius);
      margin-bottom: 20px;
    }

    .status-badge.valid {
      background: var(--success-dim);
      border: 1px solid rgba(16, 185, 129, 0.25);
    }

    .status-badge.invalid {
      background: var(--error-dim);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .status-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .status-text {
      min-width: 0;
    }

    .status-text h2 {
      font-size: 16px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .status-badge.valid .status-text h2 {
      color: var(--success);
    }

    .status-text p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    /* Mode Pill */
    .mode-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(108, 99, 255, 0.2);
      margin-bottom: 20px;
      max-width: 100%;
      text-align: center;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* Photo Gallery */
    .photo-gallery {
      margin-bottom: 16px;
    }

    .photo-container {
      position: relative;
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .photo-container img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 400px;
      object-fit: contain;
      background: #000;
    }

    .photo-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
    }

    .photo-thumb {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .photo-thumb.active {
      border-color: var(--accent);
    }

    .photo-counter {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
    }

    .description-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      margin-top: 12px;
      padding: 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    /* Map */
    .map-container {
      width: 100%;
      height: 220px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .map-coords {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 6px;
      line-height: 1.5;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    /* Hash */
    .hash-container {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
    }

    .hash-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .hash-value {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
      line-height: 1.6;
      user-select: all;
    }

    /* Info Rows */
    .info-grid {
      display: grid;
      gap: 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1 1 120px;
      min-width: 0;
    }

    .info-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      text-align: right;
      margin-left: auto;
      min-width: 0;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .info-value.mono {
      font-family: var(--mono);
      font-size: 12px;
    }

    /* Badges */
    .gps-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .gps-badge.accurate {
      background: var(--success-dim);
      color: var(--success);
    }

    .gps-badge.approximate {
      background: var(--warning-dim);
      color: var(--warning);
    }

    .gps-badge.unavailable {
      background: var(--error-dim);
      color: var(--error);
    }

    .gps-badge.private {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .tag-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface-hover);
      color: var(--text);
    }

    /* Existence Only */
    .existence-notice {
      text-align: center;
      padding: 20px;
      background: var(--accent-dim);
      border: 1px dashed rgba(108, 99, 255, 0.3);
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
    }

    .existence-notice .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .existence-notice h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .existence-notice p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Error / No Token */
    .error-container,
    .no-token {
      text-align: center;
      padding: 48px 20px;
    }

    .error-container .icon,
    .no-token .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-container h2,
    .no-token h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .error-container p,
    .no-token p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      max-width: 360px;
      margin: 0 auto;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 0;
      margin-top: auto;
    }

    .footer p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Collapsible */
    .collapsible-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      padding: 10px 0;
    }

    .collapsible-toggle:hover {
      color: var(--text);
    }

    .collapsible-toggle span:first-child {
      min-width: 0;
      text-align: left;
      overflow-wrap: anywhere;
    }

    .collapsible-toggle .arrow {
      transition: transform 0.2s;
      font-size: 12px;
      flex-shrink: 0;
    }

    .collapsible-toggle.open .arrow {
      transform: rotate(90deg);
    }

    .collapsible-content {
      display: none;
      padding-top: 8px;
    }

    .collapsible-content.open {
      display: block;
    }

    /* Animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    .fade-in-delay {
      animation-delay: 0.15s;
      opacity: 0;
    }

    .fade-in-delay-2 {
      animation-delay: 0.3s;
      opacity: 0;
    }

    /* Leaflet dark overrides */
    .leaflet-tile-pane {
      filter: brightness(0.7) contrast(1.1) saturate(0.8);
    }

    .leaflet-control-attribution {
      background: rgba(0, 0, 0, 0.6) !important;
      color: #888 !important;
      font-size: 10px !important;
    }

    .leaflet-control-attribution a {
      color: #aaa !important;
    }

    /* Drag & Drop Zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-zone .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .drop-zone h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .drop-zone p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Share Key Input */
    .key-input-container {
      margin-bottom: 20px;
    }

    .key-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .key-input:focus {
      border-color: var(--accent);
    }

    .key-input::placeholder {
      color: var(--text-secondary);
    }

    /* Verify Button */
    .verify-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 20px;
    }

    .verify-btn:hover {
      opacity: 0.9;
    }

    .verify-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* File Info */
    .file-info {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }

    .file-info .file-icon {
      font-size: 20px;
    }

    .file-info .file-name {
      font-size: 13px;
      font-weight: 500;
      flex: 1 1 180px;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .file-info .file-size {
      font-size: 12px;
      color: var(--text-secondary);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .file-info .file-remove {
      cursor: pointer;
      color: var(--error);
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* Media Verification */
    .media-check {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .media-check:last-child {
      border-bottom: none;
    }

    .media-check .check-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .media-check .check-label {
      font-size: 13px;
      flex: 1 1 180px;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .media-check .check-status {
      font-size: 12px;
      font-weight: 600;
      margin-left: auto;
      flex-shrink: 0;
    }

    .media-check .check-status.pass {
      color: var(--success);
    }

    .media-check .check-status.fail {
      color: var(--error);
    }

    .media-check .check-status.pending {
      color: var(--text-secondary);
    }

    /* Additional Verify Button */
    .verify-extra-btn {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
      max-width: 100%;
      white-space: normal;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .verify-extra-btn:hover {
      border-color: var(--accent);
    }

    @media (max-width: 560px) {
      .header {
        padding: 28px 0 16px;
      }

      .card {
        padding: 16px;
      }

      .status-badge {
        align-items: flex-start;
        padding: 14px;
      }

      .info-row {
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        gap: 6px;
      }

      .info-label {
        flex: none;
        width: 100%;
      }

      .info-value {
        flex: none;
        width: 100%;
        margin-left: 0;
        text-align: left;
      }

      .media-check {
        align-items: flex-start;
        gap: 4px 8px;
      }

      .media-check .check-status {
        width: 100%;
        margin-left: 24px;
      }

      .verify-extra-btn {
        width: 100%;
      }

      .photo-thumb {
        width: 48px;
        height: 48px;
      }

      .map-container {
        height: 200px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      <div class="header-icon">&#x1F6E1;</div>
      <h1>Proofly</h1>
      <p>Verificacion de Prueba Digital</p>
    </div>
    <div id="app"></div>
  </div>

  <div class="footer">
    <p>Proofly &mdash; Evidencia digital sellada</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    // =========================================================================
    // Configuration
    // =========================================================================
    const PROOFLY_CONFIG = window.PROOFLY_CONFIG || {
      supabaseUrl: '__SUPABASE_URL__',
      supabaseAnonKey: '__SUPABASE_ANON_KEY__',
    };
    const SUPABASE_URL = PROOFLY_CONFIG.supabaseUrl === '__SUPABASE_URL__' ? '' : PROOFLY_CONFIG.supabaseUrl;
    const SUPABASE_ANON_KEY = PROOFLY_CONFIG.supabaseAnonKey === '__SUPABASE_ANON_KEY__' ? '' : PROOFLY_CONFIG.supabaseAnonKey;
    const IV_SIZE = 16;
    const MAC_SIZE = 32;
    const MAC_PURPOSE_PREFIX = 'proofly:mac:';

    // =========================================================================
    // Helpers
    // =========================================================================

    async function supabaseRpc(fnName, params) {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        throw new Error('La verificación por token no está configurada en este deploy de GitHub Pages. Usa el enlace con #key y sube el archivo .proofly.');
      }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fnName}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify(params),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Error ${res.status}`);
      }
      return res.json();
    }

    function getToken() {
      return new URLSearchParams(window.location.search).get('token') || null;
    }

    function getShareKeyFromFragment() {
      const fragment = window.location.hash.startsWith('#')
        ? window.location.hash.slice(1)
        : window.location.hash;
      if (!fragment) return null;
      const params = new URLSearchParams(fragment);
      return params.get('key');
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function sha256Hex(data) {
      let buffer;
      if (typeof data === 'string') {
        buffer = new TextEncoder().encode(data);
      } else {
        buffer = data;
      }
      const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function sortedReplacer(_key, value) {
      if (value && typeof value === 'object' && !Array.isArray(value)) {
        return Object.keys(value).sort().reduce((sorted, key) => {
          sorted[key] = value[key];
          return sorted;
        }, {});
      }
      return value;
    }

    function normalizeShareKey(rawValue) {
      const trimmed = (rawValue || '').trim();
      if (!trimmed) return null;

      const directMatch = trimmed.match(/^[a-fA-F0-9]{64}$/);
      if (directMatch) {
        return directMatch[0].toLowerCase();
      }

      const urlMatch = trimmed.match(/[?#&]key=([a-fA-F0-9]{64})/);
      return urlMatch ? urlMatch[1].toLowerCase() : null;
    }

    function hexToBytes(hex) {
      const normalized = hex.trim();
      if (normalized.length % 2 !== 0) {
        throw new Error('Clave hexadecimal inválida');
      }

      const bytes = new Uint8Array(normalized.length / 2);
      for (let i = 0; i < normalized.length; i += 2) {
        bytes[i / 2] = parseInt(normalized.slice(i, i + 2), 16);
      }
      return bytes;
    }

    function bytesToHex(bytes) {
      return Array.from(bytes).map((byte) => byte.toString(16).padStart(2, '0')).join('');
    }

    function concatBytes(...arrays) {
      const totalLength = arrays.reduce((sum, current) => sum + current.length, 0);
      const result = new Uint8Array(totalLength);
      let offset = 0;

      for (const current of arrays) {
        result.set(current, offset);
        offset += current.length;
      }

      return result;
    }

    function bytesToBase64(bytes) {
      let binary = '';
      const chunkSize = 0x8000;
      for (let index = 0; index < bytes.length; index += chunkSize) {
        const chunk = bytes.subarray(index, index + chunkSize);
        binary += String.fromCharCode(...chunk);
      }
      return btoa(binary);
    }

    function base64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    function constantTimeEqual(a, b) {
      const maxLen = Math.max(a.length, b.length);
      let mismatch = a.length ^ b.length;

      for (let index = 0; index < maxLen; index += 1) {
        const charA = index < a.length ? a.charCodeAt(index) : 0;
        const charB = index < b.length ? b.charCodeAt(index) : 0;
        mismatch |= charA ^ charB;
      }

      return mismatch === 0;
    }

    async function hmacSha256Hex(keyHex, data) {
      const key = await crypto.subtle.importKey(
        'raw',
        hexToBytes(keyHex),
        { name: 'HMAC', hash: 'SHA-256' },
        false,
        ['sign']
      );

      const payload = typeof data === 'string' ? new TextEncoder().encode(data) : data;
      const signature = await crypto.subtle.sign('HMAC', key, payload);
      return bytesToHex(new Uint8Array(signature));
    }

    async function deriveArchiveMacKey(shareKey, proofId) {
      return hmacSha256Hex(shareKey, `${MAC_PURPOSE_PREFIX}${proofId}`);
    }

    async function decryptArchiveMedia(encryptedBase64, shareKey, proofId) {
      const combined = base64ToBytes(encryptedBase64.trim());
      if (combined.length <= IV_SIZE + MAC_SIZE) {
        throw new Error('Payload embebido inválido');
      }

      const iv = combined.slice(0, IV_SIZE);
      const mac = combined.slice(combined.length - MAC_SIZE);
      const ciphertext = combined.slice(IV_SIZE, combined.length - MAC_SIZE);
      const macKey = await deriveArchiveMacKey(shareKey, proofId);
      const expectedMac = await hmacSha256Hex(macKey, concatBytes(iv, ciphertext));
      const actualMac = bytesToHex(mac);

      if (!constantTimeEqual(expectedMac, actualMac)) {
        throw new Error('La firma MAC del archivo embebido no coincide');
      }

      const aesKey = await crypto.subtle.importKey(
        'raw',
        hexToBytes(shareKey),
        { name: 'AES-CBC' },
        false,
        ['decrypt']
      );

      const plaintext = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, aesKey, ciphertext);
      return new Uint8Array(plaintext);
    }

    async function computeManifestEvidenceHash(manifest) {
      const mediaHashes = manifest.media.map((entry) =>
        entry.hash.startsWith('sha256:') ? entry.hash.slice(7) : entry.hash
      );

      const canonical = {
        appVersion: manifest.device.appVersion,
        description: manifest.description,
        deviceModel: manifest.device.model,
        gpsCentroid: manifest.gpsCentroid
          ? { lat: manifest.gpsCentroid.lat, lng: manifest.gpsCentroid.lng }
          : null,
        gpsRadius: manifest.gpsRadius ?? null,
        mediaHashes: [...mediaHashes].sort(),
        proofId: manifest.proofId,
        sealedAt: manifest.sealedAt,
        tag: manifest.tag,
      };

      return `sha256:${await sha256Hex(JSON.stringify(canonical, sortedReplacer))}`;
    }

    async function computeManifestSignature(manifest, shareKey) {
      return `hmac-sha256:${await hmacSha256Hex(shareKey, manifest.evidenceHash)}`;
    }

    // =========================================================================
    // File-based .proofly verification (new flow)
    // =========================================================================

    let selectedFile = null;
    let previewObjectUrls = [];

    function clearPreviewObjectUrls() {
      for (const url of previewObjectUrls) {
        URL.revokeObjectURL(url);
      }
      previewObjectUrls = [];
    }

    function renderFileMode(shareKey) {
      let html = `

          <button class="verify-btn" id="verify-btn" disabled onclick="handleVerifyFile()">Verificar archivo</button>

      app.innerHTML = html;

      const dropZone = document.getElementById('drop-zone');

      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
      dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) handleFileSelected(file);
      });

        const file = e.target.files[0];

    function handleFileSelected(file) {
      if (!file.name.endsWith('.proofly')) {
        alert('Por favor selecciona un archivo .proofly');
        return;
      }
      clearPreviewObjectUrls();
      selectedFile = file;
      document.getElementById('file-info-container').innerHTML = `
        <div class="file-info">
          <span class="file-icon">&#x1F4C4;</span>

        </div>
      `;
      updateVerifyButton();
    }

    function removeFile() {
      clearPreviewObjectUrls();
      selectedFile = null;
      document.getElementById('file-info-container').innerHTML = '';
      document.getElementById('verify-result').innerHTML = '';
      updateVerifyButton();
    }

    function updateVerifyButton() {
      const btn = document.getElementById('verify-btn');
      const keyInput = document.getElementById('key-input');
      if (btn && keyInput) {
        btn.disabled = !selectedFile || !keyInput.value.trim();
      }
    }

    async function handleVerifyFile() {
      if (!selectedFile) return;

      const keyInput = document.getElementById('key-input');
      const key = normalizeShareKey(keyInput.value);

      if (!key) {
        alert('Ingresa una clave de acceso válida de 64 caracteres hex o un enlace de Proofly.');
        return;
      }

      const resultDiv = document.getElementById('verify-result');
      resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Analizando archivo...</p></div>';

      try {
        clearPreviewObjectUrls();

        // 1. Read file as ArrayBuffer
        const arrayBuffer = await selectedFile.arrayBuffer();

        // 2. Parse ZIP with JSZip
        const zip = await JSZip.loadAsync(arrayBuffer);

        // 3. Extract manifest.json
        const manifestFile = zip.file('manifest.json');
        if (!manifestFile) throw new Error('Archivo .proofly inv\u00e1lido: no contiene manifest.json');

        const manifestJson = await manifestFile.async('string');
        const manifest = JSON.parse(manifestJson);

        if (manifest.version !== '1.0') throw new Error('Versi\u00f3n de .proofly no soportada: ' + manifest.version);

        // 4. Verify evidence hash and signature using the same rules as the app
        const computedHash = await computeManifestEvidenceHash(manifest);
        const manifestValid = constantTimeEqual(computedHash, manifest.evidenceHash);
        const computedSignature = await computeManifestSignature(
          { ...manifest, evidenceHash: computedHash },
          key,
        );
        const signatureValid = constantTimeEqual(computedSignature, manifest.signature);

        // 5. Verify each media file using decrypted plaintext for embedded payloads
        const mediaResults = [];
        const previewMedia = [];

        for (const entry of manifest.media) {
          if (entry.embedded) {
            const zipFileName = 'media/' + entry.id + '.enc';
            const mediaFile = zip.file(zipFileName);

            if (mediaFile) {
              try {
                const encryptedPayload = await mediaFile.async('string');
                const plaintextBytes = await decryptArchiveMedia(encryptedPayload, key, manifest.proofId);
                const plaintextBase64 = bytesToBase64(plaintextBytes);
                const mediaHash = 'sha256:' + await sha256Hex(plaintextBase64);
                const verified = constantTimeEqual(mediaHash, entry.hash);

                mediaResults.push({
                  id: entry.id,
                  type: entry.type,
                  expected: entry.hash,
                  actual: mediaHash,
                  status: verified ? 'pass' : 'fail',
                });

                const url = URL.createObjectURL(new Blob([plaintextBytes], { type: mediaMimeType(entry.type) }));
                previewObjectUrls.push(url);
                previewMedia.push({
                  id: entry.id,
                  type: entry.type,
                  url,
                  capturedAt: entry.capturedAt,
                  verified,
                });
              } catch (_error) {
                mediaResults.push({
                  id: entry.id,
                  type: entry.type,
                  expected: entry.hash,
                  actual: null,
                  status: 'fail',
                });
              }
            } else {
              mediaResults.push({ id: entry.id, type: entry.type, expected: entry.hash, actual: null, status: 'missing' });
            }
          } else {
            mediaResults.push({ id: entry.id, type: entry.type, expected: entry.hash, actual: null, status: 'not-embedded' });
          }
        }

        // 6. Render result
        renderFileVerificationResult(manifest, {
          manifestValid,
          signatureValid,
          computedHash,
          computedSignature,
          mediaResults,
          previewMedia,
        });

      } catch (err) {
        resultDiv.innerHTML = `<div class="error-container fade-in"><div class="icon">&#x26A0;</div><h2>Error de verificaci&oacute;n</h2><p>${escapeHtml(err.message)}</p></div>`;
      }
    }

    function renderEmbeddedMedia(previewMedia, manifest, isExistence) {
      if (!previewMedia.length || isExistence) {
        return '';
      }

      const photos = previewMedia.filter((item) => item.type === 'photo' && item.verified);
      const videos = previewMedia.filter((item) => item.type === 'video' && item.verified);
      const audios = previewMedia.filter((item) => item.type === 'audio' && item.verified);
      let html = '';

      if (photos.length) {
        html += `<div class="card fade-in photo-gallery">
          <div class="card-title">Evidencia embebida</div>

            ${photos.length > 1 ? `<span class="photo-counter">1 / ${photos.length}</span>` : ''}
          </div>`;

        if (photos.length > 1) {
          html += '<div class="photo-nav">';
          photos.forEach((photo, index) => {
            html += `<img class="photo-thumb ${index === 0 ? 'active' : ''}" src="${escapeHtml(photo.url)}" onclick="selectPhoto(${index})" alt="Foto ${index + 1}" />`;
          });
          html += '</div>';
        }

        if (manifest.description) {

        }

        html += '</div>';
      } else if (manifest.description) {
        html += `<div class="card fade-in">
          <div class="card-title">Descripci&oacute;n</div>
          <div class="description-text">${escapeHtml(manifest.description)}</div>
        </div>`;
      }

      if (videos.length) {
        html += `<div class="card fade-in">
          <div class="card-title">Videos embebidos</div>`;

        videos.forEach((video) => {
          html += `<div style="margin-bottom:16px;">
            <video controls preload="metadata" style="width:100%;border-radius:12px;background:#000;" src="${escapeHtml(video.url)}"></video>
            <div class="map-coords" style="margin-top:8px;">${escapeHtml(video.id)} &mdash; ${formatDateShort(video.capturedAt)}</div>
          </div>`;
        });

        html += '</div>';
      }

      if (audios.length) {

          <div class="card-title">Audios embebidos</div>`;

        audios.forEach((audio) => {

            <div class="map-coords" style="margin-top:8px;">${escapeHtml(audio.id)} &mdash; ${formatDateShort(audio.capturedAt)}</div>
          </div>`;
        });

        html += '</div>';
      }

      window._photos = photos;
      return html;
    }

    function renderFileVerificationResult(manifest, verification) {
      const { manifestValid, signatureValid, computedHash, computedSignature, mediaResults, previewMedia } = verification;
      const allEmbeddedOk = mediaResults
        .filter((result) => result.status !== 'not-embedded' && result.status !== 'missing')
        .every((result) => result.status === 'pass');
      const isValid = manifestValid && signatureValid && allEmbeddedOk;
      const tag = TAG_LABELS[manifest.tag] || TAG_LABELS.other;
      const isExistence = manifest.description === '' && manifest.media.every(m => !m.embedded);
      const notEmbeddedCount = mediaResults.filter((result) => result.status === 'not-embedded').length;

      let html = `
        <div class="status-badge ${isValid ? 'valid' : 'invalid'} fade-in">
          <div class="status-icon">${isValid ? '&#x2705;' : '&#x274C;'}</div>
          <div class="status-text">
            <h2>${isValid ? 'Archivo verificado' : 'Verificaci\u00f3n fallida'}</h2>
            <p>${isValid ? 'Integridad confirmada para el manifiesto y los archivos embebidos' : 'El manifiesto, la firma o un archivo embebido no coinciden'} &mdash; sellada el ${formatDateShort(manifest.sealedAt)}</p>
          </div>
        </div>
      `;

      if (isExistence) {
        html += `<div class="card fade-in"><div class="existence-notice"><div class="icon">&#x1F441;</div><h3>Solo verificaci&oacute;n de existencia</h3><p>El contenido est&aacute; oculto. Solo se confirma que la prueba fue creada y sellada.</p></div></div>`;
      }

      html += renderEmbeddedMedia(previewMedia, manifest, isExistence);

      // Evidence Hash integrity
      html += `<div class="card fade-in">
        <div class="card-title">Integridad criptogr&aacute;fica</div>
        <div class="hash-container">
          <div class="hash-label">Evidence Hash ${manifestValid ? '&#x2705;' : '&#x274C;'}</div>
          <div class="hash-value">${escapeHtml(manifest.evidenceHash)}</div>
        </div>
        <div class="map-coords" style="margin-top:10px;">Recalculado: ${escapeHtml(computedHash)}</div>
        <div class="hash-container" style="margin-top:12px;">
          <div class="hash-label">Firma HMAC ${signatureValid ? '&#x2705;' : '&#x274C;'}</div>
          <div class="hash-value">${escapeHtml(manifest.signature)}</div>
        </div>
        <div class="map-coords" style="margin-top:10px;">Recalculada: ${escapeHtml(computedSignature)}</div>
      </div>`;

      // Media verification
      if (mediaResults.length > 0) {
        const passCount = mediaResults.filter(r => r.status === 'pass').length;
        html += `<div class="card fade-in">
          <div class="card-title">Verificaci&oacute;n de medios (${passCount}/${mediaResults.length})</div>`;
        for (const mr of mediaResults) {
          const icon = mr.status === 'pass' ? '&#x2705;' : mr.status === 'fail' ? '&#x274C;' : mr.status === 'not-embedded' ? '&#x1F4E4;' : '&#x2753;';
          const statusLabel = mr.status === 'pass' ? 'OK' : mr.status === 'fail' ? 'ALTERADO' : mr.status === 'not-embedded' ? 'No incluido' : 'Falta';
          const statusClass = mr.status === 'pass' ? 'pass' : mr.status === 'fail' ? 'fail' : 'pending';
          html += `<div class="media-check">
            <span class="check-icon">${icon}</span>
            <span class="check-label">${escapeHtml(mr.id)} (${mr.type})</span>
            <span class="check-status ${statusClass}">${statusLabel}</span>
          </div>`;
          if (mr.status === 'not-embedded') {
            html += `<button class="verify-extra-btn" onclick="verifyExtraMedia('${escapeHtml(mr.id)}', '${escapeHtml(mr.expected)}')">Verificar archivo por separado &rarr;</button>`;
          }
        }

        if (notEmbeddedCount > 0) {
          html += `<p style="font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:12px;">
            ${notEmbeddedCount} archivo(s) no iban embebidos en el .proofly. Su hash sigue en el manifiesto, pero debes validarlos aparte con el bot&oacute;n correspondiente.
          </p>`;
        }

        html += '</div>';
      }

      // GPS Map (multi-point)
      const gpsPoints = [];
      for (const m of manifest.media) {
        if (!m.gps) continue;
        if (m.gps.start) {
          gpsPoints.push({ lat: m.gps.start.lat, lng: m.gps.start.lng, label: m.id + ' (inicio)' });
          gpsPoints.push({ lat: m.gps.end.lat, lng: m.gps.end.lng, label: m.id + ' (fin)' });
        } else if (m.gps.lat != null) {
          gpsPoints.push({ lat: m.gps.lat, lng: m.gps.lng, label: m.id });
        }
      }

      if (gpsPoints.length > 0) {
        html += `<div class="card fade-in">
          <div class="card-title">Ubicaci&oacute;n de captura (${gpsPoints.length} puntos)</div>
          <div id="map" class="map-container"></div>
          ${manifest.gpsRadius ? `<div class="map-coords">${gpsPoints.length} archivos capturados en un radio de ${Math.round(manifest.gpsRadius)}m</div>` : ''}
        </div>`;
      }

      // Details
      html += `<div class="card fade-in">
        <div class="card-title">Detalles</div>
        <div class="info-grid">
          <div class="info-row"><span class="info-label">Fecha de sellado</span><span class="info-value">${formatDate(manifest.sealedAt)}</span></div>`;
      if (!isExistence) {
        html += `
          <div class="info-row"><span class="info-label">Descripci&oacute;n</span><span class="info-value">${escapeHtml(manifest.description)}</span></div>
          <div class="info-row"><span class="info-label">Categor&iacute;a</span><span class="info-value"><span class="tag-badge">${tag.icon} ${tag.label}</span></span></div>`;
      }
      html += `
          <div class="info-row"><span class="info-label">Archivos</span><span class="info-value">${manifest.media.length}</span></div>
          <div class="info-row"><span class="info-label">Dispositivo</span><span class="info-value">${escapeHtml(manifest.device.model)}</span></div>
          <div class="info-row"><span class="info-label">Versi&oacute;n app</span><span class="info-value mono">${escapeHtml(manifest.device.appVersion)}</span></div>
        </div>
      </div>`;

      document.getElementById('verify-result').innerHTML = html;

      // Init multi-point map after DOM is ready
      if (gpsPoints.length > 0) {
        setTimeout(() => initMultiMap(gpsPoints, manifest.gpsRadius, manifest.gpsCentroid), 100);
      }
    }

    async function verifyExtraMedia(mediaId, expectedHash) {
      const input = document.createElement('input');
      input.type = 'file';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const buffer = await file.arrayBuffer();
          const hash = 'sha256:' + await sha256Hex(bytesToBase64(new Uint8Array(buffer)));
          const match = hash === expectedHash;
          alert(match
            ? `Archivo verificado: ${mediaId} coincide con el hash del manifiesto.`
            : `ALERTA: ${mediaId} NO coincide. El archivo ha sido modificado.`
          );
        } catch (err) {
          alert('Error al verificar: ' + err.message);
        }
      };
      input.click();
    }

    // =========================================================================
    // Multi-point Map
    // =========================================================================

    function initMultiMap(points, radius, centroid) {
      const mapEl = document.getElementById('map');
      if (!mapEl) return;

      const center = centroid
        ? [centroid.lat, centroid.lng]
        : [points[0].lat, points[0].lng];

      const map = L.map(mapEl, { zoomControl: false }).setView(center, 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19,
      }).addTo(map);

      const markers = [];
      for (const pt of points) {
        const marker = L.marker([pt.lat, pt.lng]).addTo(map);
        if (pt.label) marker.bindPopup(pt.label);
        markers.push(marker);
      }

      // Draw lines between start/end GPS for video/audio tracks
      for (let i = 0; i < points.length - 1; i++) {
        const a = points[i];
        const b = points[i + 1];
        if (a.label && b.label && a.label.replace(' (inicio)', '') === b.label.replace(' (fin)', '')) {
          L.polyline([[a.lat, a.lng], [b.lat, b.lng]], { color: '#6C63FF', weight: 2, dashArray: '5,5' }).addTo(map);
        }
      }

      if (radius && centroid) {
        L.circle([centroid.lat, centroid.lng], {
          radius: radius,
          color: '#6C63FF',
          fillColor: '#6C63FF',
          fillOpacity: 0.08,
          weight: 1,
        }).addTo(map);
      }

      if (markers.length > 1) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.2));
      }
    }

    // =========================================================================
    // Main — Route to correct mode
    // =========================================================================

    async function main() {
      const token = getToken();
      const shareKey = getShareKeyFromFragment();

      // Mode 1: Legacy token-based verification (backward compatible)
      if (token) {
        renderLoading();
        try {
          const result = await supabaseRpc('verify_share', { p_token: token });
          if (result && result.error) { renderError(result.error); return; }
          if (!result || !result.share || !result.proof) { renderError('Respuesta inesperada del servidor.'); return; }
          renderResult(result);
        } catch (err) {
          renderError(err.message || 'Error de conexi\u00f3n. Intenta de nuevo.');
        }
        return;
      }

      // Mode 2: File-based .proofly verification (new)
      renderFileMode(shareKey);
    }

    main();
  </script>
</body>
